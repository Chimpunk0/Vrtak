<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kvíz – Bezpečnost a vývoj software</title>
        <link rel="icon" href="favicon.svg" type="image/svg+xml" sizes="any" />
        <link rel="stylesheet" href="vba_kviz_v3_1.css" />
        <base target="_blank" />
    </head>
    <body>
        <div class="layout">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <!-- 1. Header (len nadpis a tlačidlo zavrieť) -->
                <div class="sidebar-header">
                    <h2>📋 Obsah</h2>
                    <button
                        class="close-sidebar"
                        onclick="toggleSidebar()"
                        title="Zavrieť sidebar"
                    >
                        ×
                    </button>
                </div>

                <!-- 2. Filter sekcia (SAMOSTATNE pod headerom, nie vnútri neho!) -->
                <div class="filter-section" id="filter-section">
                    <div class="filter-header" onclick="toggleFilter()">
                        <span class="filter-icon" id="filter-icon">▼</span>
                        <span>Zobraziť sekcie</span>
                    </div>
                    <div class="filter-content" id="filter-content">
                        <div class="filter-actions">
                            <button onclick="selectAllSections(true)">
                                Všetky
                            </button>
                            <button onclick="selectAllSections(false)">
                                Žiadne
                            </button>
                        </div>
                        <div class="filter-list" id="filter-list">
                            <!-- Generuje sa cez JS -->
                        </div>
                        <button
                            class="apply-filter-btn"
                            onclick="applySectionFilter()"
                        >
                            Použiť filter
                        </button>
                    </div>
                </div>

                <!-- Flashcard Mode Button -->
                <button
                    class="flashcard-btn-sidebar"
                    onclick="openFlashcards()"
                >
                    ⚡ Flashcard – otázka po otázke
                </button>

                <!-- 3. Tree navigácia (len JEDNA, nie dve!) -->
                <nav class="tree-nav" id="tree-nav">
                    <!-- Generated by JavaScript -->
                </nav>
            </aside>

            <!-- Overlay for mobile -->
            <div
                class="sidebar-overlay"
                id="sidebar-overlay"
                onclick="toggleSidebar()"
            ></div>

            <!-- Main Content -->
            <main class="main-content" id="main-content">
                <button
                    class="menu-toggle"
                    id="menu-toggle"
                    onclick="toggleSidebar()"
                >
                    <span>☰</span>
                    <span>Menu</span>
                </button>

                <div class="container">
                    <div id="quiz-sections-mount"></div>

                    <!-- Akcie a výsledok -->
                    <div class="actions">
                        <button class="btn btn-secondary" id="clear-btn">
                            🗑 Vymazať odpovede
                        </button>
                        <button class="btn btn-primary" id="eval-btn">
                            ✅ Vyhodnotiť kvíz
                        </button>
                    </div>
                    <div class="actions" style="margin-top: 0">
                        <button
                            class="btn"
                            id="shuffle-btn"
                            style="
                                background: #7c3aed;
                                color: white;
                                font-size: 0.95rem;
                                padding: 0.6rem 1.4rem;
                            "
                            onclick="shuffleQuestions(); shuffleOptions(); clearQuiz();"
                        >
                            🔀 Zamiešať otázky &amp; odpovede
                        </button>
                        <button
                            class="btn"
                            id="practice-btn"
                            style="
                                background: #b45309;
                                color: white;
                                font-size: 0.95rem;
                                padding: 0.6rem 1.4rem;
                                display: none;
                            "
                            onclick="practiceWrongAnswers()"
                        >
                            🎯 Precvičiť chyby
                        </button>
                    </div>
                    <div
                        style="
                            text-align: center;
                            margin-top: 0.5rem;
                            margin-bottom: 1rem;
                        "
                    >
                        <small
                            id="storage-info"
                            style="
                                color: var(--text-secondary);
                                font-size: 0.82rem;
                            "
                        >
                            💾 Odpovede sa automaticky ukladajú do prehliadača
                        </small>
                    </div>

                    <div class="result-container" id="result-container">
                        <div id="result-text"></div>
                        <div class="progress-bar">
                            <div
                                class="progress-fill"
                                id="progress-fill"
                                style="width: 0%"
                            ></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>


        <!-- ── Flashcard Overlay ──────────────────────────────────────────── -->
        <div id="flashcard-overlay">
            <div class="fc-container">
                <div class="fc-header">
                    <span class="fc-title" id="fc-title"
                        >⚡ Flashcard režim</span
                    >
                    <button
                        class="fc-close"
                        onclick="closeFlashcards()"
                        title="Zavrieť"
                    >
                        ×
                    </button>
                </div>
                <div class="fc-progress-wrap">
                    <div class="fc-progress-info">
                        <span id="fc-progress-text">Otázka 1 z N</span>
                        <span id="fc-progress-pct">0%</span>
                    </div>
                    <div class="fc-progress-bar">
                        <div
                            class="fc-progress-fill"
                            id="fc-progress-fill"
                            style="width: 0%"
                        ></div>
                    </div>
                    <div class="fc-score-row">
                        <span class="fc-score-correct" id="fc-correct-count"
                            >✓ 0 správnych</span
                        >
                        <span class="fc-score-wrong" id="fc-wrong-count"
                            >✗ 0 nesprávnych</span
                        >
                        <span class="fc-score-left" id="fc-left-count"
                            >⬜ 0 zostáva</span
                        >
                    </div>
                </div>
                <div class="fc-body" id="fc-body">
                    <!-- Dynamic content -->
                </div>
                <div class="fc-footer" id="fc-footer">
                    <span class="fc-hint" id="fc-hint"></span>
                    <div style="display: flex; gap: 0.5rem">
                        <button
                            class="fc-btn fc-btn-end"
                            onclick="closeFlashcards()"
                        >
                            ✖ Skončiť
                        </button>
                        <button
                            class="fc-btn fc-btn-next"
                            id="fc-next-btn"
                            onclick="fcNext()"
                            disabled
                        >
                            Ďalšia →
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <script src="quiz_config.js"></script>
        <script src="quiz_sets/BPC_SOS_2026/BPC_SOS_2026_polsemestralka.frag.embed.js"></script>
        <script src="quiz_sets/BPC_SOS_2026/BPC_SOS_2026_polsemestralka.explanations.js"></script>
        <script src="vba_kviz_v3_1.js"></script>
    </body>
</html>
